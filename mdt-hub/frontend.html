<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDT 会诊控制台</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --card: #131a2e;
      --line: #2a3558;
      --text: #e8eeff;
      --muted: #9eabd6;
      --ok: #2ecc71;
      --warn: #f39c12;
      --bad: #ff5f6d;
      --accent: #6ea8fe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(circle at top, #121a33 0%, var(--bg) 55%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(8,12,24,.75);
      padding: 16px;
    }
    .main { padding: 16px; }
    .title { margin: 0 0 8px; font-size: 20px; }
    .muted { color: var(--muted); font-size: 12px; }
    .status-pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      font-size: 12px; background: rgba(46,204,113,.2); border: 1px solid rgba(46,204,113,.4);
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    input, textarea, button, select {
      width: 100%;
      margin-top: 8px;
      background: #0f152a;
      color: var(--text);
      border: 1px solid #2a375f;
      border-radius: 10px;
      padding: 10px;
      outline: none;
    }
    button { cursor: pointer; background: #1d2a4f; }
    button:hover { border-color: #4a6ec4; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab {
      padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; cursor: pointer;
      color: var(--muted);
    }
    .tab.active { color: var(--text); border-color: var(--accent); }
    .view { display: none; }
    .view.active { display: block; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .chart { height: 300px; }
    .timeline { max-height: 320px; overflow: auto; }

    .section-col { border: 1px solid #2a375f; border-radius: 10px; padding: 8px; background: #0f152a; }
    .section-col h4 { margin: 0 0 8px; font-size: 14px; }
    .section-list { display: flex; flex-direction: column; gap: 8px; }
    .section-item { border: 1px solid #334270; border-radius: 10px; padding: 8px; background: rgba(16, 23, 44, .85); }
    .section-item textarea { min-height: 62px; margin-top: 0; }
    .item-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; margin-top: 6px; }
    .check-inline { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
    .check-inline input { width: auto; margin: 0; }
    .item-del { width: auto; padding: 6px 10px; margin-top: 0; font-size: 12px; }
    .empty-tip { color: var(--muted); font-size: 12px; border: 1px dashed #334270; border-radius: 8px; padding: 8px; }
    .err-tip { color: #ff9aa5; font-size: 12px; min-height: 16px; margin-top: 4px; }
    .mini-btn { padding: 6px 10px; font-size: 12px; margin-top: 8px; }
    .agent-model-row { display: grid; grid-template-columns: 1fr 108px; gap: 8px; align-items: center; margin-top: 8px; }
    .agent-model-row button { margin-top: 0; padding: 8px; }
    .ev { border-bottom: 1px dashed #324069; padding: 8px 0; }
    .ev:last-child { border-bottom: 0; }

    .room {
      position: relative;
      height: 580px;
      background: linear-gradient(180deg, #1a2140 0%, #11172b 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }
    .meeting-table {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 380px; height: 180px; border-radius: 999px;
      background: #2a365f; border: 2px solid #4a5a8b;
      display: flex; align-items: center; justify-content: center;
      color: #c9d8ff; font-size: 14px;
    }
    .seat {
      position: absolute;
      width: 88px;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .avatar {
      width: 54px; height: 54px; border-radius: 50%;
      margin: 0 auto 6px;
      border: 2px solid #6b7bb0;
      display: flex; align-items: center; justify-content: center;
      background: #243258;
      font-size: 12px;
    }
    .seat.speaking .avatar { border-color: var(--ok); box-shadow: 0 0 0 6px rgba(46,204,113,.18); }
    .seat.review .avatar { border-color: var(--warn); box-shadow: 0 0 0 6px rgba(243,156,18,.18); }
    .seat.conflict .avatar { border-color: var(--bad); box-shadow: 0 0 0 6px rgba(255,95,109,.2); }
    .seat .name { font-size: 12px; color: #d8e4ff; }
    .seat .bubble {
      margin-top: 4px;
      font-size: 11px;
      color: #b5c4ee;
      background: rgba(7,10,21,.7);
      border: 1px solid #334270;
      border-radius: 8px;
      padding: 4px 6px;
      min-height: 26px;
    }
    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .grid2 { grid-template-columns: 1fr; }
      .grid3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2 class="title">MDT 控制台</h2>
      <div><span id="wsState" class="status-pill">连接中...</span></div>
      <div id="status" class="muted" style="margin-top:8px;">等待操作</div>

      <div class="panel">
        <b>会诊输入</b>
        <input id="caseId" value="CASE-LIVE-001" placeholder="Case ID" />
        <textarea id="msg" placeholder="输入临床问题...">患者发热低血压，近期广谱抗菌药暴露，伴 AKI 风险</textarea>
        <label class="check-inline" style="margin-top:8px; display:flex;">
          <input id="enableDocsContext" type="checkbox" checked />
          启用病历直读上下文
        </label>
        <div class="btn-row">
          <button onclick="submitDiscussion()">提交讨论</button>
          <button onclick="runReviewRound()">二轮互评</button>
        </div>
        <button onclick="loadConflictGraph()">刷新冲突图</button>
      </div>

      <div class="panel">
        <b>上传病历（文件/网址）</b>
        <input id="caseDocUrl" placeholder="病历网址（支持网页/PDF链接）" />
        <input id="caseDocFile" type="file" />
        <div class="btn-row">
          <button onclick="uploadCaseDocUrl()">导入网址病历</button>
          <button onclick="uploadCaseDocFile()">上传病历文件</button>
        </div>
      </div>

      <div class="panel">
        <b>病历解析结果面板（可编辑确认）</b>
        <div class="muted" style="margin:6px 0 8px;">提交会诊前可确认/采纳影像、检验、用药条目</div>
        <div class="grid3">
          <div class="section-col">
            <h4>影像</h4>
            <div id="section-imaging" class="section-list"></div>
            <div id="err-imaging" class="err-tip"></div>
            <button class="mini-btn" onclick="addSectionItem('imaging')">+ 新增影像条目</button>
          </div>
          <div class="section-col">
            <h4>检验</h4>
            <div id="section-labs" class="section-list"></div>
            <div id="err-labs" class="err-tip"></div>
            <button class="mini-btn" onclick="addSectionItem('labs')">+ 新增检验条目</button>
          </div>
          <div class="section-col">
            <h4>用药</h4>
            <div id="section-medications" class="section-list"></div>
            <div id="err-medications" class="err-tip"></div>
            <button class="mini-btn" onclick="addSectionItem('medications')">+ 新增用药条目</button>
          </div>
        </div>
        <div class="btn-row" style="margin-top:8px;">
          <button onclick="loadLatestParsedSections()">加载最近解析结果</button>
          <button onclick="resetSectionPanel()">清空面板</button>
        </div>
      </div>

      <div class="panel">
        <b>新增 Agent</b>
        <input id="newAgentId" placeholder="agent_id e.g. mdt-radiology" />
        <input id="newAgentRole" placeholder="角色 e.g. 影像评估" />
        <input id="newAgentSpec" placeholder="specialty e.g. radiology" />
        <select id="newAgentModel"></select>
        <textarea id="newAgentPrompt" placeholder="可选：自定义补充提示词"></textarea>
        <button onclick="createAgent()">新增</button>
      </div>

      <div class="panel">
        <b>喂知识（文本/文件/网址）</b>
        <input id="feedAgentId" placeholder="agent_id" />
        <input id="feedSource" value="manual" placeholder="source" />
        <textarea id="feedContent" placeholder="粘贴指南/经验知识...">AKI 场景优先按 eGFR 分层调整剂量并联合 TDM。</textarea>
        <input id="feedUrl" placeholder="知识网址（网页/PDF）" />
        <input id="feedFile" type="file" />
        <div class="btn-row">
          <button onclick="feedKnowledge()">注入文本</button>
          <button onclick="feedKnowledgeUrl()">注入网址</button>
        </div>
        <button onclick="feedKnowledgeFile()">注入文件</button>
      </div>

      <div class="panel">
        <b>Agent 模型配置</b>
        <div class="muted" id="agentsList" style="margin-top:6px;">当前 Agent: loading...</div>
        <div id="agentModelList"></div>
      </div>
    </aside>

    <main class="main">
      <div class="tabs">
        <div class="tab active" data-tab="room">会诊室视图</div>
        <div class="tab" data-tab="analytics">数据分析视图</div>
      </div>

      <section id="view-room" class="view active">
        <div class="room" id="room"></div>
      </section>

      <section id="view-analytics" class="view">
        <div class="grid2">
          <div class="panel">
            <h3 style="margin-top:0">实时时间线</h3>
            <div id="timeline" class="timeline"></div>
          </div>
          <div class="panel">
            <h3 style="margin-top:0">专家发言分布</h3>
            <div id="speakerChart" class="chart"></div>
          </div>
        </div>
        <div class="grid2">
          <div class="panel">
            <h3 style="margin-top:0">共识收敛曲线</h3>
            <div id="consensusChart" class="chart"></div>
          </div>
          <div class="panel">
            <h3 style="margin-top:0">冲突关系图</h3>
            <div id="conflictChart" class="chart"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const BASE_HOST = location.hostname || '127.0.0.1';
    const API = `http://${BASE_HOST}:8788`;
    const WS_PROTO = location.protocol === 'https:' ? 'wss' : 'ws';
    const WS_URL = `${WS_PROTO}://${BASE_HOST}:8788/ws/events`;
    let ws = null;
    const wsState = document.getElementById('wsState');
    const statusEl = document.getElementById('status');
    const timeline = document.getElementById('timeline');
    const room = document.getElementById('room');

    const speakerCounter = {};
    const consensusSeries = [];
    const speakerChart = echarts.init(document.getElementById('speakerChart'));
    const consensusChart = echarts.init(document.getElementById('consensusChart'));
    const conflictChart = echarts.init(document.getElementById('conflictChart'));
    let availableModels = [];
    let defaultModel = 'openai-codex/gpt-5.3-codex';
    let pingTimer = null;
    let pollTimer = null;
    let wsConnectTimeout = null;
    const seenEventIds = new Set();

    const AGENT_PERSONA = {
      'mdt-orchestrator': { emoji: '🎯', title: '会诊主持人', vibe: '冷静统筹型' },
      'mdt-id': { emoji: '🦠', title: '感染科主任', vibe: '耐药策略型' },
      'mdt-micro': { emoji: '🧫', title: '微生物专家', vibe: '证据谨慎型' },
      'mdt-pharm': { emoji: '💊', title: '临床药师', vibe: '剂量精算型' },
      'mdt-icu': { emoji: '🫀', title: 'ICU医生', vibe: '高危监护型' },
      'mdt-evidence': { emoji: '📚', title: '循证秘书', vibe: '文献归纳型' },
      'mdt-radiology': { emoji: '🩻', title: '影像科医生', vibe: '征象判读型' },
      'mdt-lab': { emoji: '🧪', title: '检验科医生', vibe: '指标趋势型' },
      'human_clinician': { emoji: '👨‍⚕️', title: '临床医生', vibe: '病例提出者' },
    };

    const seats = [
      { id: 'mdt-orchestrator', x: 50, y: 12, label: '主持人' },
      { id: 'mdt-id', x: 18, y: 28, label: '感染科' },
      { id: 'mdt-micro', x: 82, y: 28, label: '微生物' },
      { id: 'mdt-pharm', x: 18, y: 72, label: '药学' },
      { id: 'mdt-icu', x: 82, y: 72, label: 'ICU' },
      { id: 'mdt-evidence', x: 50, y: 88, label: '循证秘书' },
      { id: 'human_clinician', x: 50, y: 50, label: '临床输入' },
    ];
    const seatState = new Map();

    const SECTION_KEYS = ['imaging', 'labs', 'medications'];
    const sectionPanelState = {
      imaging: [],
      labs: [],
      medications: [],
    };

    function renderRoom() {
      room.innerHTML = `<div class="meeting-table">MDT 会诊桌（实时交互）</div>`;
      seats.forEach(s => {
        const st = seatState.get(s.id) || { cls: '', text: '待命中' };
        const div = document.createElement('div');
        div.className = `seat ${st.cls}`;
        div.style.left = s.x + '%';
        div.style.top = s.y + '%';
        const p = AGENT_PERSONA[s.id] || { emoji: '🤖', title: s.label || s.id, vibe: '通用专家' };
        div.innerHTML = `
          <div class="avatar" title="${p.vibe}">${p.emoji}</div>
          <div class="name">${p.title}</div>
          <div class="muted" style="font-size:11px">${s.id}</div>
          <div class="bubble">${st.text}</div>
        `;
        room.appendChild(div);
      });
    }

    function normalizeSectionItems(items) {
      return (items || [])
        .map(it => {
          if (typeof it === 'string') return { text: it, confirmed: true };
          return { text: String(it?.text || ''), confirmed: Boolean(it?.confirmed) };
        })
        .filter(it => it.text.trim().length > 0);
    }

    function renderSectionColumn(key) {
      const box = document.getElementById(`section-${key}`);
      const err = document.getElementById(`err-${key}`);
      if (!box || !err) return;
      err.textContent = '';
      const list = sectionPanelState[key] || [];
      if (!list.length) {
        box.innerHTML = `<div class="empty-tip">暂无条目，可手动新增或先导入病历。</div>`;
        return;
      }
      box.innerHTML = '';
      list.forEach((item, idx) => {
        const node = document.createElement('div');
        node.className = 'section-item';
        node.innerHTML = `
          <textarea placeholder="请输入条目内容">${item.text || ''}</textarea>
          <div class="item-row">
            <label class="check-inline">
              <input type="checkbox" ${item.confirmed ? 'checked' : ''} />
              确认/采纳
            </label>
            <button class="item-del" onclick="removeSectionItem('${key}', ${idx})">删除</button>
          </div>
        `;
        const ta = node.querySelector('textarea');
        const ck = node.querySelector('input[type="checkbox"]');
        ta.addEventListener('input', () => {
          sectionPanelState[key][idx].text = ta.value;
          if (!ta.value.trim()) err.textContent = '存在空条目，提交时会自动忽略。';
        });
        ck.addEventListener('change', () => {
          sectionPanelState[key][idx].confirmed = ck.checked;
        });
        box.appendChild(node);
      });
    }

    function renderSectionPanel() {
      SECTION_KEYS.forEach(renderSectionColumn);
    }

    function applySections(sections = {}) {
      SECTION_KEYS.forEach(key => {
        sectionPanelState[key] = normalizeSectionItems(sections[key] || []).map(it => ({ ...it }));
      });
      renderSectionPanel();
    }

    function addSectionItem(key) {
      sectionPanelState[key].push({ text: '', confirmed: true });
      renderSectionColumn(key);
    }

    function removeSectionItem(key, idx) {
      sectionPanelState[key].splice(idx, 1);
      renderSectionColumn(key);
    }

    function resetSectionPanel() {
      SECTION_KEYS.forEach(key => { sectionPanelState[key] = []; });
      renderSectionPanel();
      statusEl.textContent = '病历解析结果面板已清空';
    }

    function getConfirmedSectionsPayload() {
      const payload = {};
      SECTION_KEYS.forEach(key => {
        payload[key] = (sectionPanelState[key] || [])
          .map(it => ({ text: String(it.text || '').trim(), confirmed: Boolean(it.confirmed) }))
          .filter(it => it.text.length > 0);
      });
      return payload;
    }

    async function loadLatestParsedSections() {
      const caseId = document.getElementById('caseId').value.trim();
      const resp = await fetch(`${API}/cases/${caseId}/documents`);
      if (!resp.ok) { statusEl.textContent = `加载失败: ${await resp.text()}`; return; }
      const data = await resp.json();
      const latest = (data.documents || [])[0];
      if (!latest) {
        resetSectionPanel();
        statusEl.textContent = '当前病例暂无解析病历';
        return;
      }
      applySections(latest.sections || {});
      statusEl.textContent = `已加载最近病历解析结果（文档ID ${latest.id}）`;
    }

    function updateSeat(ev) {
      const id = ev.speaker;
      if (!id) return;
      let cls = 'speaking';
      if (ev.event_type === 'agent_review') cls = 'review';
      if (ev.event_type === 'conflict_detected') cls = 'conflict';
      const text = (ev.payload && (ev.payload.discussion || ev.payload.review || ev.payload.summary || ev.payload.text))
        ? String(ev.payload.discussion || ev.payload.review || ev.payload.summary || ev.payload.text).slice(0, 38)
        : ev.event_type;
      seatState.set(id, { cls, text });
      if (!seats.find(x => x.id === id)) {
        const pos = [15,30,45,60,75,90][(seats.length - 7) % 6];
        seats.push({ id, x: pos, y: 50, label: id });
      }
      renderRoom();
    }

    function renderCharts() {
      speakerChart.setOption({
        tooltip: {},
        xAxis: { type: 'category', data: Object.keys(speakerCounter), axisLabel: { color: '#b8c8f2' } },
        yAxis: { type: 'value', axisLabel: { color: '#b8c8f2' } },
        series: [{ type: 'bar', data: Object.values(speakerCounter), itemStyle: { color: '#6ea8fe' } }]
      });
      consensusChart.setOption({
        tooltip: {},
        xAxis: { type: 'category', data: consensusSeries.map(x => x.t), axisLabel: { color: '#b8c8f2' } },
        yAxis: { type: 'value', min: 0, max: 1, axisLabel: { color: '#b8c8f2' } },
        series: [{ type: 'line', smooth: true, data: consensusSeries.map(x => x.v), lineStyle: { color: '#2ecc71' } }]
      });
    }

    function addEvent(ev) {
      if (ev && typeof ev.event_id !== 'undefined') {
        if (seenEventIds.has(ev.event_id)) return;
        seenEventIds.add(ev.event_id);
      }
      const div = document.createElement('div');
      div.className = 'ev';
      div.innerHTML = `<b>${ev.event_type}</b> · ${ev.speaker}<div class='muted'>${ev.timestamp} | round=${ev.round_no} | conf=${ev.confidence ?? '-'}</div><div class='muted'>${JSON.stringify(ev.payload)}</div>`;
      timeline.prepend(div);

      speakerCounter[ev.speaker] = (speakerCounter[ev.speaker] || 0) + 1;
      if (ev.event_type === 'consensus_updated') {
        consensusSeries.push({ t: ev.timestamp.slice(11,19), v: typeof ev.confidence === 'number' ? ev.confidence : 0.8 });
      }
      renderCharts();
      updateSeat(ev);
    }

    function clearPing() {
      if (pingTimer) clearInterval(pingTimer);
      pingTimer = null;
    }

    function startPollingFallback() {
      if (pollTimer) return;
      pollTimer = setInterval(loadEventsFallback, 3000);
      loadEventsFallback();
    }

    function stopPollingFallback() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }

    async function loadEventsFallback() {
      const caseId = document.getElementById('caseId').value.trim();
      if (!caseId) return;
      try {
        const resp = await fetch(`${API}/cases/${caseId}/events`);
        if (!resp.ok) return;
        const data = await resp.json();
        (data.events || []).forEach(ev => {
          if (!seenEventIds.has(ev.event_id)) addEvent(ev);
        });
      } catch (_) {
        // 静默重试
      }
    }

    function connectWS() {
      wsState.textContent = 'WebSocket 连接中...';
      wsState.style.background = 'rgba(243,156,18,.2)';
      ws = new WebSocket(WS_URL);

      if (wsConnectTimeout) clearTimeout(wsConnectTimeout);
      wsConnectTimeout = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.CONNECTING) {
          wsState.textContent = 'WebSocket 连接超时（切轮询）';
          wsState.style.background = 'rgba(255,95,109,.2)';
          startPollingFallback();
          try { ws.close(); } catch (_) {}
        }
      }, 3000);

      ws.onopen = async () => {
        if (wsConnectTimeout) clearTimeout(wsConnectTimeout);
        wsState.textContent = 'WebSocket 已连接';
        wsState.style.background = 'rgba(46,204,113,.2)';
        stopPollingFallback();
        clearPing();
        ws.send('ping');
        pingTimer = setInterval(() => {
          try { ws.send('ping'); } catch (_) {}
        }, 5000);
      };

      ws.onerror = () => {
        if (wsConnectTimeout) clearTimeout(wsConnectTimeout);
        wsState.textContent = 'WebSocket 异常（切轮询）';
        wsState.style.background = 'rgba(255,95,109,.2)';
        startPollingFallback();
      };

      ws.onclose = () => {
        if (wsConnectTimeout) clearTimeout(wsConnectTimeout);
        wsState.textContent = 'WebSocket 断开（轮询模式）';
        wsState.style.background = 'rgba(255,95,109,.2)';
        clearPing();
        startPollingFallback();
        setTimeout(connectWS, 3000);
      };

      ws.onmessage = (msg) => {
        const payload = JSON.parse(msg.data);
        if (payload.type === 'mdt_event') addEvent(payload.data);
      };
    }

    async function submitDiscussion() {
      const caseId = document.getElementById('caseId').value.trim();
      const message = document.getElementById('msg').value.trim();
      if (!message) { statusEl.textContent = '请先输入会诊问题'; return; }
      const confirmedSections = getConfirmedSectionsPayload();
      await fetch(`${API}/cases/open`, {
        method: 'POST', headers: {'content-type': 'application/json'},
        body: JSON.stringify({case_id: caseId, patient_summary: {note: 'interactive case'}})
      });
      const resp = await fetch(`${API}/discussion/submit`, {
        method: 'POST', headers: {'content-type': 'application/json'},
        body: JSON.stringify({
          case_id: caseId,
          round_no: 1,
          speaker: 'human_clinician',
          message,
          confirmed_sections: confirmedSections,
          enable_docs_context: document.getElementById('enableDocsContext').checked,
        })
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `提交失败: ${JSON.stringify(data)}`; return; }
      const picked = Object.values(confirmedSections).reduce((n, arr) => n + (arr || []).filter(x => x.confirmed).length, 0);
      const docsInfo = `病历上下文:${data.docs_context_enabled ? '开' : '关'} 文档${data.docs_context_doc_count ?? 0}份`;
      statusEl.textContent = `已提交讨论，生成 ${data.generated_count} 条响应（已带入确认条目 ${picked} 条，${docsInfo}）`;
    }

    async function runReviewRound() {
      const caseId = document.getElementById('caseId').value.trim();
      const resp = await fetch(`${API}/discussion/review`, {
        method: 'POST', headers: {'content-type':'application/json'},
        body: JSON.stringify({case_id: caseId, from_round: 1, to_round: 2})
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `二轮互评失败: ${JSON.stringify(data)}`; return; }
      statusEl.textContent = `二轮互评完成，新增 ${data.generated_count} 条事件`;
      await loadConflictGraph();
    }

    async function createAgent() {
      const agent_id = document.getElementById('newAgentId').value.trim();
      const role = document.getElementById('newAgentRole').value.trim();
      const specialty = document.getElementById('newAgentSpec').value.trim();
      const model = document.getElementById('newAgentModel').value.trim();
      const prompt = document.getElementById('newAgentPrompt').value.trim();
      const resp = await fetch(`${API}/agents`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({agent_id, role, specialty, model, prompt, auto_learn_web: true})
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `新增失败: ${JSON.stringify(data)}`; return; }
      statusEl.textContent = `已新增 ${agent_id}（模型: ${data.model || '默认'}）；推荐技能: ${(data.skill_suggestions || []).join(', ') || '无'}`;
      await loadAgents();
    }

    async function updateAgentModel(agent_id, model) {
      const targetAgent = (agent_id || '').trim();
      const targetModel = typeof model === 'string' ? model.trim() : '';
      if (!targetAgent) { statusEl.textContent = '模型配置失败：缺少 agent_id'; return; }
      const resp = await fetch(`${API}/agents/${targetAgent}/model`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({model: targetModel})
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `模型更新失败: ${JSON.stringify(data)}`; return; }
      statusEl.textContent = `已更新 ${targetAgent} 模型为 ${data.model || '默认模型'}`;
      await loadAgents();
    }

    async function feedKnowledge() {
      const agent_id = document.getElementById('feedAgentId').value.trim();
      const source = document.getElementById('feedSource').value.trim() || 'manual';
      const content = document.getElementById('feedContent').value.trim();
      const resp = await fetch(`${API}/agents/${agent_id}/knowledge`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({source, content, tags:[]})
      });
      if (!resp.ok) { statusEl.textContent = `喂知识失败: ${await resp.text()}`; return; }
      statusEl.textContent = `已给 ${agent_id} 注入文本知识`;
    }

    async function feedKnowledgeUrl() {
      const agent_id = document.getElementById('feedAgentId').value.trim();
      const url = document.getElementById('feedUrl').value.trim();
      const resp = await fetch(`${API}/agents/${agent_id}/knowledge/url`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({url, source:'url'})
      });
      if (!resp.ok) { statusEl.textContent = `网址注入失败: ${await resp.text()}`; return; }
      statusEl.textContent = `已给 ${agent_id} 注入网址知识`;
    }

    async function feedKnowledgeFile() {
      const agent_id = document.getElementById('feedAgentId').value.trim();
      const f = document.getElementById('feedFile').files[0];
      if (!f) { statusEl.textContent = '请先选择知识文件'; return; }
      const fd = new FormData();
      fd.append('file', f);
      fd.append('tags', 'file,upload');
      const resp = await fetch(`${API}/agents/${agent_id}/knowledge/upload`, { method:'POST', body: fd });
      if (!resp.ok) { statusEl.textContent = `文件注入失败: ${await resp.text()}`; return; }
      statusEl.textContent = `已给 ${agent_id} 注入文件知识`;
    }

    async function uploadCaseDocUrl() {
      const caseId = document.getElementById('caseId').value.trim();
      const url = document.getElementById('caseDocUrl').value.trim();
      const resp = await fetch(`${API}/cases/${caseId}/documents/url`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({url, source:'url'})
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `病历网址导入失败: ${JSON.stringify(data)}`; return; }
      applySections(data.sections || {});
      statusEl.textContent = `病历导入完成，提取影像${(data.sections?.imaging||[]).length}条，检验${(data.sections?.labs||[]).length}条，用药${(data.sections?.medications||[]).length}条`;
    }

    async function uploadCaseDocFile() {
      const caseId = document.getElementById('caseId').value.trim();
      const f = document.getElementById('caseDocFile').files[0];
      if (!f) { statusEl.textContent = '请先选择病历文件'; return; }
      const fd = new FormData();
      fd.append('file', f);
      const resp = await fetch(`${API}/cases/${caseId}/documents/upload`, { method:'POST', body: fd });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `病历文件导入失败: ${JSON.stringify(data)}`; return; }
      applySections(data.sections || {});
      statusEl.textContent = `病历上传完成，提取影像${(data.sections?.imaging||[]).length}条，检验${(data.sections?.labs||[]).length}条，用药${(data.sections?.medications||[]).length}条`;
    }

    function modelOptionsHtml(selectedValue = '') {
      const selected = (selectedValue || '').trim();
      const opts = [`<option value="">默认模型（${defaultModel}）</option>`];
      (availableModels || []).forEach(m => {
        const safe = String(m || '');
        const sel = safe === selected ? 'selected' : '';
        opts.push(`<option value="${safe}" ${sel}>${safe}</option>`);
      });
      return opts.join('');
    }

    async function loadAvailableModels() {
      try {
        const resp = await fetch(`${API}/models/available`);
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}: ${JSON.stringify(data)}`);
        }
        availableModels = (data.models || []).map(x => String(x || '').trim()).filter(Boolean);
        defaultModel = String(data.default_model || defaultModel);

        const newAgentModel = document.getElementById('newAgentModel');
        newAgentModel.innerHTML = modelOptionsHtml('');
        if (data.fallback) {
          statusEl.textContent = `模型列表使用降级配置：${data.note || 'fallback'}`;
        }
      } catch (e) {
        statusEl.textContent = `加载模型列表失败: ${e?.message || e}`;
        throw e;
      }
    }

    async function saveAgentModel(agentId, inputId) {
      const model = document.getElementById(inputId).value.trim();
      const resp = await fetch(`${API}/agents/${agentId}/model`, {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ model })
      });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `模型更新失败: ${JSON.stringify(data)}`; return; }
      statusEl.textContent = `已更新 ${agentId} 模型为 ${data.model || '默认'}`;
      await loadAgents();
    }

    async function loadAgents() {
      try {
        const resp = await fetch(`${API}/agents`);
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}: ${JSON.stringify(data)}`);
        }
        document.getElementById('agentsList').textContent = `当前 Agent(${data.count}): ` + data.agents.map(a => `${a.agent_id}[${a.specialty}]`).join(' | ');

      const modelBox = document.getElementById('agentModelList');
      modelBox.innerHTML = '';
      data.agents.forEach((a, i) => {
        if (!seats.find(s => s.id === a.agent_id)) {
          const posX = [10, 22, 34, 66, 78, 90][i % 6];
          seats.push({ id: a.agent_id, x: posX, y: 10 + ((Math.floor(i/6)%3) * 36), label: a.specialty || a.agent_id });
        }

        const row = document.createElement('div');
        row.className = 'agent-model-row';
        const inputId = `agent-model-${a.agent_id.replace(/[^a-zA-Z0-9_-]/g, '_')}`;
        row.innerHTML = `
          <select id="${inputId}">${modelOptionsHtml(a.model || '')}</select>
          <button onclick="saveAgentModel('${a.agent_id}', '${inputId}')">保存模型</button>
        `;
        modelBox.appendChild(row);
      });

      renderRoom();
      } catch (e) {
        statusEl.textContent = `加载 Agent 列表失败: ${e?.message || e}`;
        throw e;
      }
    }

    async function loadConflictGraph() {
      const caseId = document.getElementById('caseId').value.trim();
      const resp = await fetch(`${API}/cases/${caseId}/conflicts`);
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = `加载冲突图失败: ${JSON.stringify(data)}`; return; }
      const nodes = (data.nodes || []).map((n, i) => ({ id: n.id, name: n.id, value: i, symbolSize: 44 }));
      const links = (data.edges || []).map(e => ({
        source: e.from,
        target: e.to,
        lineStyle: { color: e.stance === 'oppose' ? '#ff5f6d' : '#2ecc71', width: 2 },
        label: { show: true, formatter: e.stance }
      }));
      conflictChart.setOption({
        tooltip: {},
        series: [{ type: 'graph', layout: 'force', roam: true, label: { show: true, color: '#dbe6ff' }, data: nodes, links }]
      });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const id = tab.dataset.tab;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${id}`).classList.add('active');
      };
    });

    async function initPage() {
      renderRoom();
      renderSectionPanel();

      // 先启动实时链路，避免被其他初始化请求阻塞在“连接中”
      connectWS();

      // 数据初始化并行执行，任一失败不影响主界面连接状态
      Promise.allSettled([loadAvailableModels(), loadAgents()]).then((results) => {
        const failed = results.filter(r => r.status === 'rejected').length;
        if (failed > 0) {
          statusEl.textContent = `初始化完成（${failed}项加载失败，可重试）`;
        }
      });
    }

    initPage();
  </script>
</body>
</html>
