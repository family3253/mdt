<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>MDT 会诊可视化面板</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; }
    #timeline { max-height: 340px; overflow: auto; }
    .ev { border-bottom: 1px dashed #e5e5e5; padding: 8px 0; }
    .meta { color: #666; font-size: 12px; }
    #consensusChart, #speakerChart { height: 280px; }
    input, button { padding: 6px 8px; margin-right: 6px; }
  </style>
</head>
<body>
  <h2>MDT 交互式会诊面板</h2>
  <div class="card">
    <label>Case ID:</label><input id="caseId" value="CASE-LIVE-001" />
    <label>临床输入:</label><input id="msg" size="60" value="患者发热低血压，近期广谱抗菌药暴露" />
    <button onclick="submitDiscussion()">提交讨论</button>
    <span id="status" class="meta"></span>
  </div>

  <div class="row" style="margin-top:12px;">
    <div class="card">
      <h3>时间线（实时）</h3>
      <div id="timeline"></div>
    </div>
    <div class="card">
      <h3>专家发言分布</h3>
      <div id="speakerChart"></div>
    </div>
  </div>

  <div class="card" style="margin-top:12px;">
    <h3>共识收敛曲线</h3>
    <div id="consensusChart"></div>
  </div>

  <script>
    const API = `http://${location.hostname}:8788`;
    const ws = new WebSocket(`ws://${location.hostname}:8788/ws/events`);
    const timeline = document.getElementById('timeline');
    const statusEl = document.getElementById('status');

    const speakerCounter = {};
    const consensusSeries = [];

    const speakerChart = echarts.init(document.getElementById('speakerChart'));
    const consensusChart = echarts.init(document.getElementById('consensusChart'));

    function renderCharts() {
      speakerChart.setOption({
        xAxis: { type: 'category', data: Object.keys(speakerCounter) },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: Object.values(speakerCounter) }]
      });

      consensusChart.setOption({
        xAxis: { type: 'category', data: consensusSeries.map(x => x.t) },
        yAxis: { type: 'value', min: 0, max: 1 },
        series: [{ type: 'line', smooth: true, data: consensusSeries.map(x => x.v) }]
      });
    }

    function addEvent(ev) {
      const div = document.createElement('div');
      div.className = 'ev';
      div.innerHTML = `<b>${ev.event_type}</b> · ${ev.speaker}<div class='meta'>${ev.timestamp} | round=${ev.round_no} | conf=${ev.confidence ?? '-'}</div><div>${JSON.stringify(ev.payload)}</div>`;
      timeline.prepend(div);

      speakerCounter[ev.speaker] = (speakerCounter[ev.speaker] || 0) + 1;
      if (ev.event_type === 'consensus_updated') {
        const val = typeof ev.confidence === 'number' ? ev.confidence : 0.8;
        consensusSeries.push({ t: ev.timestamp.slice(11,19), v: val });
      }
      renderCharts();
    }

    ws.onopen = () => {
      statusEl.textContent = 'WebSocket 已连接';
      ws.send('ping');
      setInterval(() => ws.send('ping'), 5000);
    };

    ws.onmessage = (msg) => {
      const payload = JSON.parse(msg.data);
      if (payload.type === 'mdt_event') addEvent(payload.data);
    };

    async function submitDiscussion() {
      const caseId = document.getElementById('caseId').value.trim();
      const message = document.getElementById('msg').value.trim();
      if (!caseId || !message) return;

      // ensure case exists (ignore 409)
      await fetch(`${API}/cases/open`, {
        method: 'POST', headers: {'content-type': 'application/json'},
        body: JSON.stringify({case_id: caseId, patient_summary: {note: 'interactive case'}})
      });

      const resp = await fetch(`${API}/discussion/submit`, {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({case_id: caseId, round_no: 1, speaker: 'human_clinician', message})
      });
      const data = await resp.json();
      statusEl.textContent = `已提交，生成 ${data.generated_count} 条专家/主持响应`;
    }
  </script>
</body>
</html>
